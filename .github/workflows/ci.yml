name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-checks:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Basic committed-secret hygiene
        run: |
          set -e
          if git ls-files | grep -E '(^|/)(\.env|.*\.pem|id_rsa|id_ed25519)$'; then
            echo "Sensitive runtime or private-key file is tracked." >&2
            exit 1
          fi
          if git grep -n -I -E 'sk-(proj-)?[A-Za-z0-9_-]{32,}' -- ':!*.md' ':!.env.example' ':!.github/workflows/ci.yml'; then
            echo "Potential committed OpenAI API key found." >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Compile Python files
        run: |
          python -m compileall main.py config.py src
          if [ -d tools ]; then
            python -m compileall tools
          fi
          if [ -d tests ]; then
            python -m compileall tests
          fi

      - name: Run tests if present
        run: |
          if [ -d tests ]; then
            python -m unittest discover -s tests -p "test*.py"
          else
            echo "No tests directory found yet. Skipping unittest."
          fi
