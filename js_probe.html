<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JS Probe</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #d8dee9;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --ok: #15803d;
      --warn: #b45309;
      --bad: #b91c1c;
    }
    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      line-height: 1.5;
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
    }
    h1, h2 {
      margin: 0 0 10px;
    }
    p, li {
      color: var(--muted);
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 12px 0;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    button.secondary {
      background: #475569;
    }
    .status {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .ok {
      background: #dcfce7;
      color: var(--ok);
    }
    .warn {
      background: #fef3c7;
      color: var(--warn);
    }
    .bad {
      background: #fee2e2;
      color: var(--bad);
    }
    .box {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #f8fafc;
      margin-top: 10px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
      color: var(--text);
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>JavaScript 動作確認</h1>
      <p>このファイルは JavaScript が動くかだけを切り分ける最小確認用です。既存フォームの処理は入っていません。</p>
      <div id="boot-status" class="status bad">JS未実行</div>
      <div id="env-box" class="box">初期化前</div>
    </div>

    <div class="card">
      <h2>基本イベント</h2>
      <div class="row">
        <button type="button" id="ping-btn">クリック確認</button>
        <button type="button" class="secondary" id="dom-btn">DOM書き換え</button>
      </div>
      <div id="event-log" class="box">まだ操作されていません</div>
    </div>

    <div class="card">
      <h2>入力反映</h2>
      <input id="text-input" type="text" value="ここを書き換えてください">
      <div class="row">
        <button type="button" id="mirror-btn">入力値を下へ反映</button>
      </div>
      <textarea id="mirror-output">ここに反映されます</textarea>
    </div>

    <div class="card">
      <h2>保存系 API</h2>
      <div class="row">
        <button type="button" id="storage-btn">localStorage確認</button>
        <button type="button" class="secondary" id="copy-btn">clipboard確認</button>
      </div>
      <div id="api-log" class="box">未確認</div>
    </div>
  </div>

  <script>
    (function () {
      var bootStatus = document.getElementById('boot-status');
      var envBox = document.getElementById('env-box');
      var eventLog = document.getElementById('event-log');
      var apiLog = document.getElementById('api-log');
      var mirrorOutput = document.getElementById('mirror-output');
      var textInput = document.getElementById('text-input');

      function setStatus(el, text, className) {
        el.textContent = text;
        el.className = 'status ' + className;
      }

      function log(el, text) {
        el.textContent = text;
      }

      setStatus(bootStatus, 'JS実行中', 'ok');
      envBox.textContent =
        'userAgent: ' + navigator.userAgent + '\n' +
        'clipboard API: ' + (navigator.clipboard && navigator.clipboard.writeText ? 'available' : 'missing') + '\n' +
        'localStorage: ' + (window.localStorage ? 'present' : 'missing');

      document.getElementById('ping-btn').addEventListener('click', function () {
        log(eventLog, 'クリックイベントは動いています');
      });

      document.getElementById('dom-btn').addEventListener('click', function () {
        log(eventLog, 'DOM書き換え成功: ' + new Date().toLocaleString());
      });

      document.getElementById('mirror-btn').addEventListener('click', function () {
        mirrorOutput.value = '反映結果:\n' + textInput.value;
      });

      document.getElementById('storage-btn').addEventListener('click', function () {
        try {
          window.localStorage.setItem('js_probe_test', 'ok');
          var saved = window.localStorage.getItem('js_probe_test');
          log(apiLog, 'localStorage成功: ' + saved);
        } catch (error) {
          log(apiLog, 'localStorage失敗: ' + String(error));
        }
      });

      document.getElementById('copy-btn').addEventListener('click', function () {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText('js_probe_clipboard_test');
          log(apiLog, 'clipboard呼び出しを実行しました');
          return;
        }
        log(apiLog, 'clipboard API が見つかりません');
      });
    })();
  </script>
</body>
</html>
